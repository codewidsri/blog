<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Aptitude</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='Aptitude.css'>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,100,0,200" />
</head>

<body>
    <main>
        <section class="posts">
            <!-- <div class="post">
                <div class="left">
                    <a href="#">APTITUDE TEST 1</a>
                    <h4>Total Number of Questions :- 15</h4>
                    <h4>Total Time :- 15 minutes</h4>
                </div>
                <div class="right">
                    <button onclick="window.location.href='aptitude-test.html?test=1'">Proceed Test</button>
                </div>
            </div> -->
        </section>
    </main>
</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        let posts = document.getElementsByClassName('posts')[0];
        fetch('./questions.json').then((data) => { return data.json() }).then((data) => {
            data.map((ele, index) => {
                posts.innerHTML += `<div class="post">
                <div class="left">
                    <a href="#">PROBLEMS ON ${data[0][0].category} ${index + 1}</a>
                    <h4>Number of Questions :- ${ele.length}</h4>
                    <h4>Time :- ${ele.length} minutes</h4>
                </div>
                <div class="right">
                    <button onclick="window.location.href='aptitude-test.html?test=${index + 1}'">Take Test</button>
                </div>
            </div>`;
            })
        })
    })
</script>

</html>
